                 <div className="text-center mb-12">
                    <h2 className={`text-3xl font-medium mb-4 ${isDark ? 'text-white' : 'text-gray-900'}`}>Technical Arsenal</h2>
                    <p className={isDark ? 'text-gray-400' : 'text-gray-500'}>The tools I use to deliver scalable solutions.</p>
                 </div>

                 {/* CONDITIONAL RENDERING: CARD GRID (DARK) vs LIST (LIGHT) */}
                 {isDark ? (
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        {Object.entries(data.skills).map(([category, items], idx) => (
                            <div key={idx} className="bg-[#1E1F20] border border-white/5 rounded-2xl p-6 hover:border-blue-400/30 transition-colors">
                                <h3 className="text-lg font-medium text-white mb-4 flex items-center gap-2">
                                    {category === 'Languages' && <Icon path={Icons.Code} size={20} className="text-blue-500"/>}
                                    {category === 'Frameworks' && <Icon path={Icons.Server} size={20} className="text-purple-400"/>}
                                    {category === 'Tools' && <Icon path={Icons.Zap} size={20} className="text-yellow-500"/>}
                                    {category === 'Databases' && <Icon path={Icons.Database} size={20} className="text-green-500"/>}
                                    {category}
                                </h3>
                                <div className="flex flex-wrap gap-2">
                                    {items.map((skill, sIdx) => (
                                        <span key={sIdx} className="text-sm text-gray-400 bg-white/5 px-3 py-1 rounded-lg">{skill}</span>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </div>
                 ) : (
                    <div className="bg-white rounded-2xl shadow-sm border border-gray-200 px-6 py-2">
                        {Object.entries(data.skills).map(([category, items], idx) => (
                            <SkillList key={idx} category={category} items={items} />
                        ))}
                    </div>
                 )}
            </section>
        );

        const GeminiChat = ({ isDark }) => {
            const [isOpen, setIsOpen] = useState(false);
            const [messages, setMessages] = useState([{ sender: 'bot', text: "Hello! I'm Vivek's AI Agent. Ask me about his Java experience, freelancing rates, or projects." }]);
            const [input, setInput] = useState("");
            const [loading, setLoading] = useState(false);
            const bottomRef = useRef(null);

            useEffect(() => bottomRef.current?.scrollIntoView({ behavior: "smooth" }), [messages, isOpen]);

            const callGeminiAPI = async (query) => {
                setLoading(true);
                const sysPrompt = `You are an AI assistant for Vivek Jain's portfolio. 
                Data: ${JSON.stringify(data)}. 
                Tone: Professional, confident, concise.
                Rules: Emphasize his 30% optimization impact. If asked about freelancing, say he is available and open to discuss backend/fullstack projects.
                Current User Query: ${query}`;

                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: query }] }],
                            systemInstruction: { parts: [{ text: sysPrompt }] }
                        })
                    });
                    const json = await res.json();
                    const reply = json.candidates?.[0]?.content?.parts?.[0]?.text || "I'm having trouble connecting to the server.";
                    setMessages(prev => [...prev, { sender: 'bot', text: reply }]);
                } catch (e) {
                    setMessages(prev => [...prev, { sender: 'bot', text: "Error connecting to AI." }]);
                }
                setLoading(false);
            };

            const handleSend = () => {
                if (!input.trim()) return;
                setMessages(prev => [...prev, { sender: 'user', text: input }]);
                const query = input;
                setInput("");
                callGeminiAPI(query);
            };

            return (
                <div className="fixed bottom-6 right-6 z-50 flex flex-col items-end">
                    {isOpen && (
                        <div className={`w-80 md:w-96 rounded-2xl shadow-2xl mb-4 overflow-hidden flex flex-col max-h-[500px] border ${isDark ? 'bg-[#1E1F20] border-white/10' : 'bg-white border-gray-200'}`}>
                            <div className={`p-4 border-b flex justify-between items-center ${isDark ? 'bg-[#2D2E30] border-white/5' : 'bg-gradient-to-r from-blue-600 to-indigo-600 text-white'}`}>
                                <div className="flex items-center gap-2 font-medium">
                                    <span className={isDark ? 'text-blue-400' : 'text-white'}><Icon path={Icons.Sparkles} size={16}/></span>
                                    AI Assistant
                                </div>
                                <button onClick={() => setIsOpen(false)} className={isDark ? 'text-gray-400 hover:text-white' : 'text-white/80 hover:text-white'}><Icon path={Icons.X} size={18}/></button>
                            </div>
                            <div className={`flex-1 overflow-y-auto p-4 space-y-4 ${isDark ? 'bg-[#131314]' : 'bg-gray-50'}`}>
                                {messages.map((m, i) => (
                                    <div key={i} className={`flex ${m.sender === 'user' ? 'justify-end' : 'justify-start'}`}>
                                        <div className={`max-w-[85%] rounded-2xl px-4 py-2 text-sm leading-relaxed ${
                                            m.sender === 'user' 
                                            ? 'bg-blue-600 text-white rounded-br-none' 
                                            : isDark 
                                                ? 'bg-[#2D2E30] text-gray-200 border border-white/5 rounded-bl-none' 
                                                : 'bg-white text-gray-800 border border-gray-100 shadow-sm rounded-bl-none'
                                        }`}>
                                            {m.sender === 'bot' ? <div dangerouslySetInnerHTML={{__html: m.text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')}}/> : m.text}
                                        </div>
                                    </div>
                                ))}
                                {loading && (
                                    <div className="flex justify-start">
                                        <div className={`rounded-2xl px-4 py-3 flex gap-1 ${isDark ? 'bg-[#2D2E30]' : 'bg-white border border-gray-100'}`}>
                                            <div className="w-1.5 h-1.5 bg-gray-500 rounded-full typing-dot"></div>
                                            <div className="w-1.5 h-1.5 bg-gray-500 rounded-full typing-dot"></div>
                                            <div className="w-1.5 h-1.5 bg-gray-500 rounded-full typing-dot"></div>
                                        </div>
                                    </div>
                                )}
                                <div ref={bottomRef}></div>
                            </div>
                            <div className={`p-3 border-t flex gap-2 ${isDark ? 'bg-[#1E1F20] border-white/5' : 'bg-white border-gray-100'}`}>
                                <input 
                                    className={`flex-1 text-sm rounded-full px-4 py-2 focus:outline-none focus:ring-1 border ${isDark ? 'bg-[#131314] text-white border-white/10 focus:ring-blue-400' : 'bg-gray-100 text-gray-800 border-transparent focus:ring-blue-500'}`}
                                    placeholder="Ask about Vivek..."
                                    value={input}
                                    onChange={e => setInput(e.target.value)}
                                    onKeyPress={e => e.key === 'Enter' && handleSend()}
                                />
                                <button onClick={handleSend} className={`p-2 rounded-full transition-colors ${isDark ? 'bg-white text-black hover:bg-gray-200' : 'bg-blue-600 text-white hover:bg-blue-700'}`}>
                                    <Icon path={Icons.Send} size={18} />
                                </button>
                            </div>
                        </div>
                    )}
                    <button 
                        onClick={() => setIsOpen(!isOpen)}
                        className={`p-4 rounded-full text-white shadow-lg hover:scale-105 transition-transform group ${isDark ? 'bg-gemini-gradient' : 'bg-gradient-to-r from-blue-600 to-indigo-600'}`}
                    >
                        {isOpen ? <Icon path={Icons.X} /> : <Icon path={Icons.Sparkles} className="group-hover:animate-pulse"/>}
                    </button>
                </div>
            );
        };

        const Hero = ({ isDark }) => (
            <section id="about" className="pt-32 pb-20 px-6 max-w-7xl mx-auto text-center">
                <div className={`inline-block mb-6 px-4 py-1.5 rounded-full border text-sm font-medium animate-fade-in-up ${isDark ? 'border-white/10 bg-white/5 text-blue-400' : 'bg-blue-100 text-blue-800 border-transparent'}`}>
                    <span className="mr-2">✨</span> Open for Freelance & Full-time
                </div>
                
                <h1 className={`text-4xl md:text-7xl font-medium tracking-tight mb-6 ${isDark ? 'bg-clip-text text-transparent bg-gradient-to-b from-white to-gray-400' : 'text-gray-900'}`}>
                    Power your backend with <br />
                    <span className={`bg-clip-text text-transparent ${isDark ? 'bg-gemini-text' : 'bg-gradient-to-r from-blue-600 to-indigo-600'}`}>
                        business impact.
                    </span>
                </h1>
                
                <p className={`text-lg md:text-xl max-w-2xl mx-auto mb-10 leading-relaxed ${isDark ? 'text-gray-400' : 'text-gray-500'}`}>
                    {data.profile.summary}
                </p>
                
                <div className="flex flex-wrap justify-center gap-4">
                    <a href={data.profile.contact.linkedin} target="_blank" className={`px-8 py-3 rounded-full font-medium flex items-center gap-2 transition-all ${isDark ? 'bg-gemini-gradient text-white hover:opacity-90' : 'bg-blue-600 text-white hover:bg-blue-700 shadow-lg'}`}>
                        LinkedIn <Icon path={Icons.Linkedin} size={18} />
                    </a>
                    <a href={data.profile.contact.github} target="_blank" className={`px-8 py-3 rounded-full font-medium flex items-center gap-2 border transition-all ${isDark ? 'border-white/20 text-white hover:bg-white/10' : 'border-gray-300 text-blue-600 hover:bg-blue-50'}`}>
                        GitHub <Icon path={Icons.Github} size={18} />
                    </a>
                </div>
            </section>
        );

        const App = () => {
            const [isDark, setIsDark] = useState(false);

            useEffect(() => {
                const root = window.document.documentElement;
                if (isDark) {
                    root.classList.add('dark');
                } else {
                    root.classList.remove('dark');
                }
            }, [isDark]);

            return (
                <div className="min-h-screen">
                    <Navbar isDark={isDark} toggleTheme={() => setIsDark(!isDark)} />
                    <Hero isDark={isDark} />
                    
                    {/* EXPERIENCE SLIDER (BOTH MODES) */}
                    <div id="experience" className={isDark ? 'bg-[#1E1F20]/30 border-y border-white/5' : 'bg-white'}>
                        <SectionSlider isDark={isDark} title="Experience" subtitle="Swipe to see my professional journey.">
                            {data.experience.map((job, idx) => (
                                <ExperienceCard key={idx} job={job} isDark={isDark} />
                            ))}
                        </SectionSlider>
                    </div>

                    {/* NEW SECTIONS */}
                    <ServicesSection isDark={isDark} />
                    <TechSection isDark={isDark} />
                    <LearningSection isDark={isDark} />

                    {/* PROJECT SLIDER (BOTH MODES) */}
                    <div id="projects" className={`py-10 ${isDark ? 'border-t border-white/5' : ''}`}>
                        <SectionSlider isDark={isDark} title="Featured Projects" subtitle="Academic & Personal Deployments">
                             {data.projects.map((proj, idx) => (
                                <ProjectCard key={idx} proj={proj} isDark={isDark} />
                            ))}
                        </SectionSlider>
                    </div>

                    <footer className={`py-10 text-center text-sm border-t mt-10 ${isDark ? 'text-gray-400 border-white/5' : 'text-gray-500 border-gray-200'}`}>
                        &copy; {new Date().getFullYear()} Vivek Jain. Vivek.jainism@outlook.com
                    </footer>
                    <GeminiChat isDark={isDark} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
